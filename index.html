<!doctype html>
<html lang="en">
  <head>
    <!-- META -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Add to cart using - HTML, CSS, TailwindCSS, and JavaScript</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />

    <!-- Font awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Tailwind cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- CSS Custome classes -->
    <style>
      .font-instrument-sans {
        font-family: "Instrument Sans", sans-serif;
        font-optical-sizing: auto;
        font-weight: weight;
        font-style: normal;
        font-variation-settings: "wdth" 100;
      }

      .in-stock {
        @apply w-4 h-4 rounded-full bg-purple-500 animate-pulse;
      }

      .low-stock {
        @apply w-4 h-4 bg-orange-500 animate-pulse;
      }

      #wish-button {
        @apply transition-colors duration-200;
      }

      .item-selected {
        @apply bg-gray-200/50;
      }
    </style>
  </head>
  <body class="font-instrument-sans bg-gray-300 text-gray-900">
    <div id="app" class="w-11/12 h-screen mx-auto">
      <div
        id="cart-container"
        class="w-full flex max-[964px]:flex-col justify-between gap-8 my-8"
      ></div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
